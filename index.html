<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌸 나의 하루</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FFB5C8;
  --pink-light: #FFE0EA;
  --peach: #FFDDD2;
  --lavender: #D4C5F9;
  --lav-light: #EDE8FF;
  --mint: #C5F0E4;
  --mint-light: #E8FBF4;
  --yellow: #FFF3B0;
  --cream: #FFF9F5;
  --brown: #6B4C3B;
  --soft-brown: #A07060;
  --border: #F0E0D8;
  --shadow: rgba(180,120,100,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  padding-bottom: 90px;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; top: -80px; right: -80px;
  width: 320px; height: 320px;
  background: radial-gradient(circle, #FFD6E0 0%, transparent 70%);
  z-index: 0; pointer-events: none;
}
body::after {
  content: '';
  position: fixed; bottom: -60px; left: -60px;
  width: 260px; height: 260px;
  background: radial-gradient(circle, #D4C5F9 0%, transparent 70%);
  z-index: 0; pointer-events: none;
}
.container { max-width: 430px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }

/* 헤더 */
.header { padding: 24px 0 12px; text-align: center; }
.header-emoji { font-size: 30px; display: block; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.header h1 { font-family: 'Gaegu', cursive; font-size: 26px; color: var(--brown); font-weight: 700; }
.date-text { font-size: 12px; color: var(--soft-brown); margin-top: 2px; opacity: 0.8; }

/* 탭 */
.tabs {
  display: flex; gap: 6px; margin: 12px 0;
  background: white; padding: 5px; border-radius: 18px;
  box-shadow: 0 2px 12px var(--shadow);
}
.tab-btn {
  flex: 1; padding: 9px 4px; border: none; background: transparent;
  border-radius: 13px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--soft-brown); cursor: pointer;
  transition: all 0.22s ease; font-weight: 500;
}
.tab-btn.active { background: var(--pink); color: var(--brown); font-weight: 700; box-shadow: 0 2px 8px rgba(255,181,200,0.5); }
.tab-btn span { display: block; font-size: 17px; margin-bottom: 1px; }

/* 섹션 */
.section { display: none; }
.section.active { display: block; }

/* 카드 */
.card {
  background: white; border-radius: 20px; padding: 18px;
  margin-bottom: 14px; box-shadow: 0 3px 16px var(--shadow);
  position: relative; overflow: hidden;
}
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
.card.pink::before { background: linear-gradient(90deg, var(--pink), var(--peach)); }
.card.lavender::before { background: linear-gradient(90deg, var(--lavender), #B8A9F5); }
.card.mint::before { background: linear-gradient(90deg, var(--mint), #A8E6CF); }
.card-title { font-family: 'Gaegu', cursive; font-size: 19px; color: var(--brown); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }

/* ── 달력 ── */
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.cal-month { font-family: 'Gaegu', cursive; font-size: 18px; color: var(--brown); }
.cal-nav {
  background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--soft-brown); padding: 4px 8px;
  border-radius: 8px; transition: background 0.15s;
}
.cal-nav:active { background: var(--pink-light); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-day-label {
  text-align: center; font-size: 10px; color: var(--soft-brown);
  opacity: 0.7; padding: 2px 0; font-weight: 500;
}
.cal-day-label:first-child { color: #FF8FAB; }
.cal-day-label:last-child { color: #89A9F5; }
.cal-cell {
  aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 12px; cursor: pointer;
  transition: all 0.15s; position: relative; color: var(--brown);
  font-weight: 400;
}
.cal-cell:first-child { color: #FF8FAB; }
.cal-cell.sun { color: #FF8FAB; }
.cal-cell.sat { color: #89A9F5; }
.cal-cell.empty { cursor: default; }
.cal-cell.today { background: var(--pink); font-weight: 700; color: var(--brown); box-shadow: 0 2px 6px rgba(255,181,200,0.5); }
.cal-cell.selected { background: var(--lavender); font-weight: 700; color: #5A3D8A; }
.cal-cell.has-todo::after {
  content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--pink);
}
.cal-cell.today.has-todo::after { background: var(--brown); }
.cal-cell:not(.empty):not(.today):not(.selected):active { background: var(--pink-light); }

/* 선택된 날 할일 */
.day-panel {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px dashed var(--border);
}
.day-panel-title {
  font-size: 13px; color: var(--soft-brown); margin-bottom: 10px;
  font-weight: 500;
}
.todo-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px dashed #F5E6E0;
  animation: fadeIn 0.25s ease;
}
.todo-item:last-of-type { border-bottom: none; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.todo-check {
  width: 22px; height: 22px; border: 2px solid var(--pink);
  border-radius: 50%; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.18s; background: white;
}
.todo-check.done { background: var(--pink); border-color: var(--pink); }
.todo-check.done::after { content: '✓'; color: white; font-size: 12px; font-weight: bold; }
.todo-text { flex: 1; font-size: 13px; color: var(--brown); transition: all 0.18s; }
.todo-text.done { text-decoration: line-through; opacity: 0.4; }
.todo-delete { background: none; border: none; cursor: pointer; font-size: 14px; opacity: 0.25; padding: 4px; transition: opacity 0.15s; }
.todo-delete:active { opacity: 0.7; }
.add-row { display: flex; gap: 7px; margin-top: 12px; }
.add-input {
  flex: 1; padding: 9px 13px; border: 2px solid var(--border);
  border-radius: 13px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: var(--brown); outline: none;
  background: var(--cream); transition: border-color 0.18s;
}
.add-input:focus { border-color: var(--pink); }
.add-input::placeholder { color: #D0B8B0; }
.add-btn {
  width: 40px; height: 40px; background: var(--pink); border: none;
  border-radius: 13px; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(255,181,200,0.5); transition: transform 0.12s;
}
.add-btn:active { transform: scale(0.9); }

/* 진행률 */
.progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.progress-bar-bg { flex: 1; height: 7px; background: #F5E6E0; border-radius: 99px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink), #FF8FAB); border-radius: 99px; transition: width 0.35s ease; }
.progress-text { font-size: 11px; color: var(--soft-brown); min-width: 32px; text-align: right; }

/* ── 습관 트래커 ── */
.habit-item { margin-bottom: 18px; animation: fadeIn 0.25s ease; }
.habit-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.habit-emoji { font-size: 18px; }
.habit-name { font-size: 13px; color: var(--brown); flex: 1; font-weight: 500; }
.habit-streak { font-size: 11px; color: var(--soft-brown); background: var(--peach); padding: 2px 8px; border-radius: 99px; }
.habit-del { background: none; border: none; cursor: pointer; opacity: 0.25; font-size: 13px; padding: 2px; }

.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.month-day-label { text-align: center; font-size: 9px; color: var(--soft-brown); opacity: 0.6; padding-bottom: 2px; }
.month-cell {
  aspect-ratio: 1; border-radius: 6px;
  border: 1.5px solid #EDE0F5;
  background: white; cursor: pointer;
  font-size: 9px; color: #C0A8B8;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; position: relative;
}
.month-cell.checked { background: var(--lavender); border-color: var(--lavender); color: #7B5EA7; font-size: 11px; }
.month-cell.today-cell { border-color: var(--pink); }
.month-cell.future { opacity: 0.35; cursor: default; }

.habit-add-btn {
  width: 100%; margin-top: 4px; padding: 10px;
  background: var(--lav-light); border: 2px dashed var(--lavender);
  border-radius: 13px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: #7B5EA7; font-weight: 600; cursor: pointer;
  transition: background 0.15s;
}
.habit-add-btn:active { background: var(--lavender); }

/* ── 프로젝트 ── */
.project-card {
  background: var(--cream); border-radius: 16px; padding: 15px;
  margin-bottom: 11px; border: 2px solid var(--border);
  animation: fadeIn 0.25s ease;
}
.project-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.project-emoji { font-size: 24px; width: 42px; height: 42px; border-radius: 11px; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px var(--shadow); flex-shrink: 0; }
.project-info { flex: 1; min-width: 0; }
.project-name { font-size: 14px; font-weight: 600; color: var(--brown); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-desc { font-size: 11px; color: var(--soft-brown); opacity: 0.8; margin-bottom: 4px; }
.project-dates { font-size: 10px; color: var(--soft-brown); opacity: 0.7; }
.project-status { font-size: 10px; padding: 3px 9px; border-radius: 99px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.status-doing { background: #FFE0F0; color: #C0607A; }
.status-done  { background: var(--mint); color: #3A9070; }
.status-hold  { background: var(--yellow); color: #8A7020; }
.project-bottom { display: flex; align-items: center; gap: 8px; }
.project-progress-bg { flex: 1; height: 6px; background: white; border-radius: 99px; overflow: hidden; border: 1px solid #F0E0D8; }
.project-progress-fill { height: 100%; background: linear-gradient(90deg, var(--lavender), #B09FE8); border-radius: 99px; transition: width 0.35s; }
.project-pct { font-size: 11px; color: var(--soft-brown); }
.project-del { background: none; border: none; cursor: pointer; opacity: 0.22; font-size: 13px; padding: 2px 4px; }

/* 프로젝트 할일 섹션 */
.project-todos { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
.project-todo-title { font-size: 11px; color: var(--soft-brown); margin-bottom: 6px; }
.project-todo-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; }
.ptodo-check { width: 18px; height: 18px; border: 1.5px solid var(--lavender); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: white; transition: all 0.15s; }
.ptodo-check.done { background: var(--lavender); }
.ptodo-check.done::after { content: '✓'; color: #7B5EA7; font-size: 10px; font-weight: bold; }
.ptodo-text { flex: 1; color: var(--brown); }
.ptodo-text.done { text-decoration: line-through; opacity: 0.4; }
.ptodo-del { background: none; border: none; cursor: pointer; opacity: 0.2; font-size: 12px; }

.project-add-btn {
  width: 100%; padding: 11px;
  background: var(--mint-light); border: 2px dashed var(--mint);
  border-radius: 13px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: #3A9070; font-weight: 600; cursor: pointer;
  margin-bottom: 11px;
}

/* 폼 공통 */
.form-card {
  background: white; border-radius: 16px; padding: 16px;
  border: 2px dashed var(--pink); margin-bottom: 12px;
}
.form-card.lav { border-color: var(--lavender); }
.form-card.grn { border-color: var(--mint); }
.form-row { margin-bottom: 10px; }
.form-label { font-size: 11px; color: var(--soft-brown); margin-bottom: 4px; }
.form-input {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: 10px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: var(--brown); background: var(--cream); outline: none;
}
.form-input:focus { border-color: var(--lavender); }
.form-select {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: 10px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: var(--brown); background: var(--cream); outline: none; appearance: none;
}
.form-date-row { display: flex; gap: 8px; }
.form-date-row .form-input { flex: 1; }
.form-range { width: 100%; accent-color: var(--lavender); margin-top: 4px; }
.form-btns { display: flex; gap: 7px; margin-top: 12px; }
.btn-cancel { flex: 1; padding: 10px; border: 1.5px solid var(--border); border-radius: 12px; background: white; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--soft-brown); cursor: pointer; }
.btn-save { flex: 2; padding: 10px; border: none; border-radius: 12px; background: var(--lavender); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #5A3D8A; font-weight: 600; cursor: pointer; }
.btn-save.pink { background: var(--pink); color: var(--brown); }
.btn-save.grn { background: var(--mint); color: #3A7060; }

/* 빈 상태 */
.empty-state { text-align: center; padding: 24px 16px; color: var(--soft-brown); opacity: 0.55; }
.empty-state .e-emoji { font-size: 36px; margin-bottom: 6px; display: block; }
.empty-state p { font-size: 12px; line-height: 1.6; }

/* 모달 */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(107,76,59,0.22);
  z-index: 150; display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white; border-radius: 26px 26px 0 0;
  padding: 22px 18px 40px; width: 100%; max-width: 430px;
  animation: slideUp 0.28s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-title { font-family: 'Gaegu', cursive; font-size: 20px; color: var(--brown); margin-bottom: 18px; text-align: center; }
.emoji-picker { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.emoji-opt {
  width: 38px; height: 38px; border: 2px solid var(--border); border-radius: 9px;
  background: white; font-size: 19px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.13s;
}
.emoji-opt.selected { border-color: var(--lavender); background: var(--lav-light); }

/* 토스트 */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--brown); color: white; padding: 9px 18px;
  border-radius: 18px; font-size: 12px; opacity: 0; pointer-events: none;
  transition: opacity 0.25s; z-index: 200; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* FAB */
.fab {
  position: fixed; bottom: 22px; right: 20px;
  width: 54px; height: 54px;
  background: linear-gradient(135deg, var(--pink), #FF8FAB);
  border: none; border-radius: 50%; font-size: 24px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,100,150,0.38); z-index: 100;
  transition: transform 0.12s; display: flex; align-items: center; justify-content: center;
}
.fab:active { transform: scale(0.9); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="header-emoji">🌸</span>
    <h1>나의 하루</h1>
    <div class="date-text" id="dateText"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('todo')"><span>📅</span>할 일</button>
    <button class="tab-btn" onclick="switchTab('habit')"><span>🌱</span>습관</button>
    <button class="tab-btn" onclick="switchTab('project')"><span>✨</span>프로젝트</button>
  </div>

  <!-- ── 할 일 탭 ── -->
  <div class="section active" id="tab-todo">
    <div class="card pink">
      <div class="card-title">📅 달력</div>
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="calMonthLabel"></div>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>

      <div class="day-panel">
        <div class="day-panel-title" id="dayPanelTitle"></div>
        <div class="progress-row">
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="todoProgress" style="width:0%"></div></div>
          <div class="progress-text" id="todoProgressText">0%</div>
        </div>
        <div id="todoList"></div>
        <div class="add-row" id="addRow">
          <input class="add-input" id="todoInput" placeholder="할 일 추가..." onkeydown="if(event.key==='Enter')addTodo()">
          <button class="add-btn" onclick="addTodo()">＋</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 습관 탭 ── -->
  <div class="section" id="tab-habit">
    <div class="card lavender">
      <div class="card-title">🌿 이번달 습관</div>
      <div id="habitList"></div>
      <button class="habit-add-btn" onclick="openHabitModal()">+ 습관 추가하기</button>
    </div>
  </div>

  <!-- ── 프로젝트 탭 ── -->
  <div class="section" id="tab-project">
    <div class="card mint">
      <div class="card-title">💫 프로젝트</div>
      <div id="projectFormWrap" style="display:none">
        <div class="form-card grn">
          <div class="form-row">
            <div class="form-label">프로젝트 이름</div>
            <input class="form-input" id="pjName" placeholder="예: 포트폴리오 완성">
          </div>
          <div class="form-row">
            <div class="form-label">한 줄 설명</div>
            <input class="form-input" id="pjDesc" placeholder="어떤 작업인가요?">
          </div>
          <div class="form-row">
            <div class="form-label">기간</div>
            <div class="form-date-row">
              <input type="date" class="form-input" id="pjStart">
              <span style="display:flex;align-items:center;color:var(--soft-brown);font-size:13px;">~</span>
              <input type="date" class="form-input" id="pjEnd">
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">상태</div>
            <select class="form-select" id="pjStatus">
              <option value="doing">진행중 🔥</option>
              <option value="hold">보류중 ⏸️</option>
              <option value="done">완료 ✅</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-label">진행률 <span id="pjPctLabel">0%</span></div>
            <input type="range" class="form-range" id="pjPct" min="0" max="100" value="0" oninput="document.getElementById('pjPctLabel').textContent=this.value+'%'">
          </div>
          <div class="form-btns">
            <button class="btn-cancel" onclick="cancelProject()">취소</button>
            <button class="btn-save grn" onclick="saveProject()">저장 💾</button>
          </div>
        </div>
      </div>
      <div id="projectList"></div>
      <div id="projectEmpty" class="empty-state">
        <span class="e-emoji">🌱</span>
        <p>아직 프로젝트가 없어요<br>새 프로젝트를 만들어봐요!</p>
      </div>
    </div>
  </div>
</div>

<button class="fab" onclick="handleFab()">＋</button>
<div class="toast" id="toast"></div>

<!-- 습관 추가 모달 -->
<div class="modal-overlay" id="habitModal" onclick="closeHabitModalOutside(event)">
  <div class="modal">
    <div class="modal-title">🌱 새 습관 만들기</div>
    <div class="form-row">
      <div class="form-label">이모지</div>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>
    <div class="form-row">
      <div class="form-label">습관 이름</div>
      <input class="form-input" id="habitInput" placeholder="예: 물 2L 마시기">
    </div>
    <div style="margin-top:14px;">
      <button class="btn-save pink" style="width:100%;" onclick="saveHabit()">추가하기 ✨</button>
    </div>
  </div>
</div>

<!-- 프로젝트 할일 추가 모달 -->
<div class="modal-overlay" id="ptodoModal" onclick="closePtodoModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="ptodoModalTitle">📌 할 일 추가</div>
    <div class="form-row">
      <div class="form-label">오늘 할 일</div>
      <input class="form-input" id="ptodoInput" placeholder="이 프로젝트에서 할 일..." onkeydown="if(event.key==='Enter')savePtodo()">
    </div>
    <div style="margin-top:14px;">
      <button class="btn-save" style="width:100%;" onclick="savePtodo()">추가하기</button>
    </div>
  </div>
</div>

<script>
// ── 날짜 유틸 ──
const DAY_NAMES = ['일','월','화','수','목','금','토'];
const now = new Date();
const todayStr = toDateStr(now);

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDisplay(dateStr) {
  if(!dateStr) return '';
  const [y,m,d] = dateStr.split('-');
  return `${m}/${d}`;
}
function formatKor(dateStr) {
  const [y,m,d] = dateStr.split('-');
  const dt = new Date(+y,+m-1,+d);
  return `${+m}월 ${+d}일 (${DAY_NAMES[dt.getDay()]})`;
}

document.getElementById('dateText').textContent =
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${DAY_NAMES[now.getDay()]})`;

// ── 데이터 ──
let todos = JSON.parse(localStorage.getItem('todos2')||'{}'); // {dateStr: [{text,done}]}
let habits = JSON.parse(localStorage.getItem('habits2')||'[]');
let projects = JSON.parse(localStorage.getItem('projects2')||'[]');

function save() {
  localStorage.setItem('todos2', JSON.stringify(todos));
  localStorage.setItem('habits2', JSON.stringify(habits));
  localStorage.setItem('projects2', JSON.stringify(projects));
}

// ── 탭 ──
let currentTab = 'todo';
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['todo','habit','project'][i]===tab);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  currentTab = tab;
}

// ── FAB ──
function handleFab() {
  if(currentTab==='todo') document.getElementById('todoInput').focus();
  else if(currentTab==='habit') openHabitModal();
  else if(currentTab==='project') showProjectForm();
}

// ── 토스트 ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// ══════════════════════════
//        달력 + 할 일
// ══════════════════════════
let calYear = now.getFullYear();
let calMonth = now.getMonth();
let selectedDate = todayStr;

function changeMonth(dir) {
  calMonth += dir;
  if(calMonth < 0) { calMonth = 11; calYear--; }
  if(calMonth > 11) { calMonth = 0; calYear++; }
  renderCal();
}

function renderCal() {
  document.getElementById('calMonthLabel').textContent = `${calYear}년 ${calMonth+1}월`;
  const grid = document.getElementById('calGrid');

  // 요일 라벨
  const labels = ['일','월','화','수','목','금','토'];
  let html = labels.map((l,i)=>`<div class="cal-day-label${i===0?' sun':i===6?' sat':''}">${l}</div>`).join('');

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth+1, 0).getDate();

  // 빈칸
  for(let i=0;i<firstDay;i++) html += `<div class="cal-cell empty"></div>`;

  for(let d=1;d<=lastDate;d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = (firstDay+d-1)%7;
    const isToday = ds===todayStr;
    const isSel = ds===selectedDate;
    const hasTodo = todos[ds] && todos[ds].length>0;
    let cls = 'cal-cell';
    if(dow===0) cls+=' sun';
    if(dow===6) cls+=' sat';
    if(isToday) cls+=' today';
    if(isSel && !isToday) cls+=' selected';
    if(hasTodo) cls+=' has-todo';
    html += `<div class="${cls}" onclick="selectDate('${ds}')">${d}</div>`;
  }
  grid.innerHTML = html;
  renderDayPanel();
}

function selectDate(ds) {
  selectedDate = ds;
  renderCal();
}

function renderDayPanel() {
  const isToday = selectedDate === todayStr;
  document.getElementById('dayPanelTitle').textContent = isToday ? '오늘 할 일' : `${formatKor(selectedDate)} 할 일`;

  // 오늘이 아니면 입력 숨기기
  document.getElementById('addRow').style.display = isToday ? 'flex' : 'none';

  const list = document.getElementById('todoList');
  const items = todos[selectedDate] || [];

  if(items.length===0) {
    list.innerHTML = `<div class="empty-state"><span class="e-emoji">${isToday?'🌷':'🗓'}</span><p>${isToday?'오늘 할 일을 추가해봐요!':'이날은 할 일이 없어요'}</p></div>`;
  } else {
    list.innerHTML = items.map((t,i)=>`
      <div class="todo-item">
        <div class="todo-check ${t.done?'done':''}" onclick="toggleTodo(${i})"></div>
        <span class="todo-text ${t.done?'done':''}">${t.text}</span>
        <button class="todo-delete" onclick="deleteTodo(${i})">🗑</button>
      </div>
    `).join('');
  }

  const done = items.filter(t=>t.done).length;
  const pct = items.length ? Math.round(done/items.length*100) : 0;
  document.getElementById('todoProgress').style.width = pct+'%';
  document.getElementById('todoProgressText').textContent = pct+'%';
}

function addTodo() {
  const inp = document.getElementById('todoInput');
  const text = inp.value.trim();
  if(!text) return;
  if(!todos[todayStr]) todos[todayStr]=[];
  todos[todayStr].push({text, done:false});
  inp.value = '';
  save();
  renderCal();
  showToast('할 일 추가 ✅');
}
function toggleTodo(i) {
  todos[selectedDate][i].done = !todos[selectedDate][i].done;
  save(); renderDayPanel(); renderCal();
  if(todos[selectedDate][i].done) showToast('완료! 🎉');
}
function deleteTodo(i) {
  todos[selectedDate].splice(i,1);
  save(); renderCal();
}

// ══════════════════════════
//       습관 트래커
// ══════════════════════════
const EMOJIS = ['🌸','🌿','💧','📚','🏃','🎨','🧘','☀️','🍎','✏️','💪','🎵','😴','🧴','🥗'];
let selEmoji = '🌸';

function openHabitModal() {
  const picker = document.getElementById('emojiPicker');
  picker.innerHTML = EMOJIS.map(e=>`<button class="emoji-opt ${e===selEmoji?'selected':''}" onclick="pickEmoji('${e}',this)">${e}</button>`).join('');
  document.getElementById('habitInput').value = '';
  document.getElementById('habitModal').classList.add('show');
}
function closeHabitModalOutside(e) { if(e.target.id==='habitModal') document.getElementById('habitModal').classList.remove('show'); }
function pickEmoji(e, el) {
  selEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}
function saveHabit() {
  const name = document.getElementById('habitInput').value.trim();
  if(!name) return;
  // 이번달 일수만큼 배열
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  habits.push({ name, emoji: selEmoji, checks: Array(daysInMonth).fill(false) });
  document.getElementById('habitModal').classList.remove('show');
  save(); renderHabits();
  showToast('습관 추가 🌱');
}

function renderHabits() {
  const list = document.getElementById('habitList');
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayD = now.getDate();

  if(habits.length===0) {
    list.innerHTML = '<div class="empty-state"><span class="e-emoji">🌱</span><p>좋은 습관을 시작해봐요!</p></div>';
    return;
  }

  list.innerHTML = habits.map((h,hi)=>{
    const streak = h.checks.slice(0, todayD).filter(Boolean).length;
    // 요일 라벨 (1일이 무슨 요일인지)
    const firstDow = new Date(year, month, 1).getDay(); // 0=일
    const dayLabels = ['일','월','화','수','목','금','토'];
    let gridHtml = dayLabels.map(l=>`<div class="month-day-label">${l}</div>`).join('');
    // 빈칸
    for(let i=0;i<firstDow;i++) gridHtml += `<div></div>`;
    for(let d=1;d<=daysInMonth;d++) {
      const idx = d-1;
      const isFuture = d > todayD;
      const isToday = d === todayD;
      let cls = 'month-cell';
      if(h.checks[idx]) cls += ' checked';
      if(isToday) cls += ' today-cell';
      if(isFuture) cls += ' future';
      const onclick = isFuture ? '' : `onclick="toggleHabit(${hi},${idx})"`;
      gridHtml += `<div class="${cls}" ${onclick}>${h.checks[idx]?'✓':d}</div>`;
    }
    return `
      <div class="habit-item">
        <div class="habit-header">
          <span class="habit-emoji">${h.emoji}</span>
          <span class="habit-name">${h.name}</span>
          <span class="habit-streak">🔥 ${streak}일</span>
          <button class="habit-del" onclick="deleteHabit(${hi})">✕</button>
        </div>
        <div class="month-grid">${gridHtml}</div>
      </div>
    `;
  }).join('');
}

function toggleHabit(hi, di) {
  habits[hi].checks[di] = !habits[hi].checks[di];
  save(); renderHabits();
}
function deleteHabit(i) { habits.splice(i,1); save(); renderHabits(); }

// ══════════════════════════
//        프로젝트
// ══════════════════════════
const STATUS_LABEL = {doing:'진행중 🔥', done:'완료 ✅', hold:'보류중 ⏸️'};
const STATUS_CLS   = {doing:'status-doing', done:'status-done', hold:'status-hold'};
const PROJ_EMOJIS  = {doing:'🔥', done:'✅', hold:'⏸️'};

function showProjectForm() {
  const today = todayStr;
  document.getElementById('pjStart').value = today;
  document.getElementById('pjEnd').value = today;
  document.getElementById('pjName').value = '';
  document.getElementById('pjDesc').value = '';
  document.getElementById('pjPct').value = 0;
  document.getElementById('pjPctLabel').textContent = '0%';
  document.getElementById('projectFormWrap').style.display = 'block';
  document.getElementById('pjName').focus();
}
function cancelProject() { document.getElementById('projectFormWrap').style.display='none'; }
function saveProject() {
  const name = document.getElementById('pjName').value.trim();
  if(!name) return;
  projects.push({
    name,
    desc: document.getElementById('pjDesc').value.trim(),
    start: document.getElementById('pjStart').value,
    end: document.getElementById('pjEnd').value,
    status: document.getElementById('pjStatus').value,
    pct: parseInt(document.getElementById('pjPct').value),
    todos: []
  });
  document.getElementById('projectFormWrap').style.display='none';
  save(); renderProjects();
  showToast('프로젝트 추가 ✨');
}

let activePjIdx = null;
function openPtodoModal(i) {
  activePjIdx = i;
  document.getElementById('ptodoModalTitle').textContent = `📌 ${projects[i].name}`;
  document.getElementById('ptodoInput').value = '';
  document.getElementById('ptodoModal').classList.add('show');
  setTimeout(()=>document.getElementById('ptodoInput').focus(), 200);
}
function closePtodoModalOutside(e) { if(e.target.id==='ptodoModal') document.getElementById('ptodoModal').classList.remove('show'); }
function savePtodo() {
  const text = document.getElementById('ptodoInput').value.trim();
  if(!text || activePjIdx===null) return;
  projects[activePjIdx].todos.push({text, done:false, date:todayStr});
  document.getElementById('ptodoModal').classList.remove('show');
  save(); renderProjects();
}
function togglePtodo(pi, ti) {
  projects[pi].todos[ti].done = !projects[pi].todos[ti].done;
  save(); renderProjects();
}
function deletePtodo(pi, ti) { projects[pi].todos.splice(ti,1); save(); renderProjects(); }

function renderProjects() {
  const list = document.getElementById('projectList');
  const empty = document.getElementById('projectEmpty');
  if(projects.length===0) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';

  list.innerHTML = projects.map((p,i)=>{
    const dateRange = (p.start||p.end) ? `${formatDisplay(p.start)} ~ ${formatDisplay(p.end)}` : '';
    const todayTodos = p.todos.filter(t=>t.date===todayStr);
    const todayDone = todayTodos.filter(t=>t.done).length;

    let todosHtml = '';
    if(p.todos.length>0) {
      const items = p.todos.map((t,ti)=>`
        <div class="project-todo-item">
          <div class="ptodo-check ${t.done?'done':''}" onclick="togglePtodo(${i},${ti})"></div>
          <span class="ptodo-text ${t.done?'done':''}">${t.text} <span style="font-size:10px;opacity:0.5">${formatDisplay(t.date)}</span></span>
          <button class="ptodo-del" onclick="deletePtodo(${i},${ti})">✕</button>
        </div>
      `).join('');
      todosHtml = `<div class="project-todos">
        <div class="project-todo-title">📋 할 일 (오늘 ${todayDone}/${todayTodos.length} 완료)</div>
        ${items}
      </div>`;
    }

    return `
      <div class="project-card">
        <div class="project-top">
          <div class="project-emoji">${PROJ_EMOJIS[p.status]||'📌'}</div>
          <div class="project-info">
            <div class="project-name">${p.name}</div>
            ${p.desc?`<div class="project-desc">${p.desc}</div>`:''}
            ${dateRange?`<div class="project-dates">📅 ${dateRange}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <span class="project-status ${STATUS_CLS[p.status]}">${STATUS_LABEL[p.status]}</span>
            <button class="ptodo-del" style="opacity:0.22;font-size:12px;" onclick="deleteProject(${i})">✕ 삭제</button>
          </div>
        </div>
        <div class="project-bottom">
          <div class="project-progress-bg"><div class="project-progress-fill" style="width:${p.pct}%"></div></div>
          <div class="project-pct">${p.pct}%</div>
          <button style="background:none;border:1px solid var(--mint);border-radius:8px;padding:3px 8px;font-size:11px;color:#3A9070;cursor:pointer;margin-left:4px;" onclick="openPtodoModal(${i})">+ 할 일</button>
        </div>
        ${todosHtml}
      </div>
    `;
  }).join('');
}

function deleteProject(i) { projects.splice(i,1); save(); renderProjects(); }

// ── 초기 렌더 ──
renderCal();
renderHabits();
renderProjects();
</script>
</body>
</html>
